
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080c14">
  <title>STRIKE</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="page-home"     class="page active"></div>
    <div id="page-team"     class="page"></div>
    <div id="page-players"  class="page"></div>
    <div id="page-rankings" class="page"></div>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
      </svg><span>홈</span>
    </button>
    <button class="nav-btn" data-page="team">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg><span>팀 기록</span>
    </button>
    <button class="nav-btn" data-page="players">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg><span>선수 기록</span>
    </button>
    <button class="nav-btn" data-page="rankings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg><span>랭킹</span>
    </button>
  </nav>

  <div id="player-modal" class="player-modal"></div>
  <div id="game-popup"   class="game-popup hidden"></div>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":  "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
